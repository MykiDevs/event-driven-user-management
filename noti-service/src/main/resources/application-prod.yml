spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_SMTP_PORT}
server:
  port: 8081
springdoc:
  api-docs:
    enabled: false